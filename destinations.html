<!DOCTYPE html>
<html>
<head>
<title>Destinations</title>

<style>

body{
    font-family:Arial;
    margin:0;
    background:#f2f2f2;
}

.navbar{
    background:#333;
    padding:15px;
}

.navbar a{
    color:white;
    text-decoration:none;
    margin-right:20px;
}

/* Section */

.section{
    padding:40px;
    text-align:center;
    background-image: url("images/bg.avif");
    background-repeat:no-repeat;
    background-size:cover;
}

/* Destination Cards */

.place{
    width:300px;
    background:white;
    margin:20px;
    display:inline-block;
    border:1px solid #ccc;
    border-radius:15px;
    box-shadow:0px 10px 15px rgba(0,0,0,0.2);
    transition:0.3s;
}

.place:hover{
    transform: translateY(-10px);
}

.place img{
    width:100%;
    height:200px;
    border-radius:15px 15px 0px 0px;
}

.place h3{
    margin:10px;
}

.place p{
    padding:0 10px;
}

/* Button */

.btn{
    display:inline-block;
    margin:15px;
    padding:10px 20px;
    border-radius:20px;
    text-decoration:none;
    background:#333;
    color:white;
    box-shadow:0px 5px 10px rgba(0,0,0,0.3);
}

.btn:hover{
    background:green;
    transform: translateY(-3px);
}

/* Heading */

.section h1{
    text-align:center;
    font-size:70px;
    background-image:url("images/text.jpg");
    color:transparent;
    height:100px;
    background-clip:text;
}

</style>
</head>

<body>

<div class="navbar">
<a href="index.html">Home</a>
<a href="destinations.html">Destinations</a>
<a href="packages.html">Packages</a>
<a href="about.html">About</a>
<a href="contact.html">Contact</a>
</div>

<div class="section">

<h1>TOP DESTINATIONS</h1>

<div class="place">
    <img src="images/Taj-Mahal.jpg">
    <h3>Agra</h3>
    <p>Visit the famous Taj Mahal.</p>
    <a href="packages.html" class="btn">Book Now</a>
</div>

<div class="place">
    <img src="images/goa-beach.jpg">
    <h3>Goa</h3>
    <p>Enjoy beautiful beaches.</p>
    <a href="packages.html" class="btn">Book Now</a>
</div>

<div class="place">
    <img src="images/mysore-palace.jpg">
    <h3>Mysore</h3>
    <p>Explore historical palace.</p>
    <a href="packages.html" class="btn">Book Now</a>
</div>

</div>

</body>
</html>
