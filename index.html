<!DOCTYPE html>
<html>
<head>
<title>Travel India</title>

<style>

body{
    margin:0;
    font-family:Arial;
    background:#f2f2f2;
}

.navbar{
    background:linear-gradient(135deg, rgb(0, 157, 255), whitesmoke);
    padding:15px;
}

.navbar a{
    color:black;
    text-decoration:none;
    margin-right:20px;
    font-size:18px;
}

.navbar a:hover{
    color:red;
}

.hero{
    background-image:url("images/Taj-Mahal.jpg");
    height:400px;
    background-size:cover;
    text-align:center;
    color:white;
    padding-top:150px;
}

.hero h1, p
{
   color: #403e3e;
}

.section{
    padding:40px;
    text-align:center;
    background:linear-gradient(125deg ,rgba(6, 113, 234, 0.696), rgb(255, 255, 255),rgb(255, 169, 183) );
}

.place{
    width:300px;
    background:white;
    margin:20px;
    display:inline-block;
    border:1px solid #ccc;
    border-radius: 15px;
    box-shadow:0px 10px 15px 0px ;
    transition:0.3s;
}

.place img
{
    border-radius: 15px;
}

.place img{
    width:100%;
    height:200px;
}

.madurai, .goa, .mysore
{
    background:radial-gradient(ellipse, rgba(239, 57, 57, 0.6), white, pink) ;
}  

.footer{
    background:#333;
    color:white;
    text-align:center;
    padding:20px;
}

.madurai:hover
{
    transform: translateY(-10px);
}

.goa:hover
{
    transform: translateY(-10px);
}

.mysore:hover
{
    transform: translateY(-10px);
}


</style>
</head>

<body>

<div class="navbar">
<a href="index.html">Home</a>
<a href="destinations.html">Destinations</a>
<a href="packages.html">Packages</a>
<a href="about.html">About</a>
<a href="contact.html">Contact</a>
</div>

<div class="hero">
    <h1>Explore Incredible India</h1>
    <p>Travel the most beautiful places</p>
</div>

<div class="section">
    <h2>Popular Places</h2>

    <div class="place madurai">
        <img src="images/temple.avif">
        <h3>Madurai</h3>
    </div>

    <div class="place goa">
        <img src="images/goa.jpg">
        <h3>Goa</h3>
    </div>

    <div class="place mysore">
        <img src="images/mysore.webp">
        <h3>Mysore</h3>
    </div>

</div>

<div class="footer">
    <p>© 2026 Travel India</p>
</div>

</body>
</html>
